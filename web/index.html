  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #FFFFFF;
          background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: #121212;
          }
    }
  </style>
  <script id="splash-screen-script">
    (function() {
      var isDark = false;
      try {
        var stored = localStorage.getItem('flutter.theme_is_dark');
        if (stored !== null) {
          isDark = (stored === 'true');
        } else {
          isDark = false; // Default to Light Mode
        }
      } catch (e) {}

      // Force background color immediately to avoid flash
      var bgColor = isDark ? '#121212' : '#FFFFFF';
      var style = document.createElement('style');
      style.id = 'theme-override-style';
      style.innerHTML = 'body { background-color: ' + bgColor + ' !important; } html { background-color: ' + bgColor + ' !important; }';
      document.head.appendChild(style);

      var updateSplash = function() {
        var splash = document.getElementById('splash');
        if (splash) {
          var img = splash.querySelector('img');
          var sources = splash.querySelectorAll('source');
          
          sources.forEach(function(s) {
            s.removeAttribute('media');
            if (isDark) {
              s.srcset = s.srcset.replace(/light/g, 'dark');
            } else {
              s.srcset = s.srcset.replace(/dark/g, 'light');
            }
          });
          
          if (img) {
            img.src = isDark ? 'splash/img/dark-1x.png' : 'splash/img/light-1x.png';
          }
        }
      };

      // Use an interval to execute as early as the DOM elements are available
      var checkCount = 0;
      var splashInterval = setInterval(function() {
        checkCount++;
        var splash = document.getElementById('splash');
        if (splash) {
          updateSplash();
          clearInterval(splashInterval);
        } else if (checkCount > 500) { // Timeout after 5 seconds
          clearInterval(splashInterval);
        }
      }, 10);

      window.removeSplashFromWeb = function() {
        document.getElementById("splash")?.remove();
        document.getElementById("splash-branding")?.remove();
        document.body.style.background = "transparent";
      };
    })();
  </script>
</head>
<body>
  <picture id="splash">
      <source srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x" media="(prefers-color-scheme: light)">
      <source srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x" media="(prefers-color-scheme: dark)">
      <img class="center" aria-hidden="true" src="splash/img/light-1x.png" alt="">
  </picture>
